services:
  - type: web
    name: insurance-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NOMIC_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
    plan: free
