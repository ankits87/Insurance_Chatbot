# Eval test cases for the Chatbot RAG pipeline.
#
# Each case is scored on 4 dimensions: retrieval quality, answer accuracy,
# citation quality, hallucination rate. See evals/run_evals.py.
#
# expected_chunks: the (product_name, section, subsection) tuples that SHOULD
#   appear in retrieval/citations. Leave empty ([]) for refusal-style questions
#   where no policy chunk should ground the answer.
# expected_answer: ground truth used by the LLM-judge accuracy check. DRAFTED
#   BY CLAUDE from answers observed during manual testing this session — review
#   and correct before trusting eval results, per the agreed split of work.
# must_include: optional, deterministic substring checks (case-insensitive).
# notes: free text, e.g. known limitations.

- id: cosmetic-exclusion-global-health
  query: "What is excluded under cosmetic treatment in the Global Health policy?"
  expected_chunks:
    - product_name: "Indusind Global Health"
      section: "SECTION-4 EXCLUSIONS"
      subsection: "4.1.7. Cosmetic or Plastic Surgery (Code: Excl 08)"
  expected_answer: >
    Expenses for cosmetic or plastic surgery or any treatment to change appearance
    are excluded, unless it is for reconstruction following an Accident, Burn(s),
    or Cancer, or as part of Medically Necessary Treatment to remove a direct and
    immediate health risk to the insured, certified by the attending Medical
    Practitioner. OPD expenses for cosmetic or routine preventive health check-ups
    are also excluded.

- id: cosmetic-exclusion-health-infinity
  query: "What is excluded under cosmetic treatment in the Infinity policy?"
  expected_chunks:
    - product_name: "Indusind Health Infinity"
      section: "SECTION 4. EXCLUSIONS"
      subsection: "4.1.8. Cosmetic or Plastic Surgery (Code: Excl 08)"
  expected_answer: >
    Expenses for cosmetic or plastic surgery or any treatment to change appearance
    are excluded, unless it is for reconstruction following an Accident, Burn(s),
    or Cancer, or as part of Medically Necessary Treatment to remove a direct and
    immediate health risk to the insured. OPD expenses for cosmetic or routine
    preventive health check-ups are also not covered.

- id: cosmetic-exclusion-health-gain
  query: "What is excluded under cosmetic treatment in the Health Gain policy?"
  expected_chunks:
    - product_name: "Indusind Health Gain"
      section: "SECTION-4 EXCLUSIONS"
      subsection: "4.1.8. Cosmetic or Plastic Surgery (Code: Excl 08)"
  expected_answer: >
    Expenses for cosmetic or plastic surgery or any treatment to change appearance
    are excluded, unless it is for reconstruction following an Accident, Burn(s),
    or Cancer, or as part of Medically Necessary Treatment to remove a direct and
    immediate health risk to the insured, certified by the attending Medical
    Practitioner.
  must_include:
    - "certified"
  notes: >
    Known model gap: the LLM consistently omits the "certified by the attending
    Medical Practitioner" clause even when the correct chunk is retrieved. The
    must_include check tracks this deterministically.

- id: preexisting-waiting-period-global-health
  query: "What is the waiting period for pre-existing diseases under the Global Health policy?"
  expected_chunks:
    - product_name: "Indusind Global Health"
      section: "SECTION-4 EXCLUSIONS"
      subsection: "4.1.1. Pre-Existing Disease Waiting Period (Code:Excl01)"
    - product_name: "Indusind Global Health"
      section: "SECTION-3 SCOPE OF COVER"
      subsection: "3.3.3 Change in Pre-Existing Waiting Period"
  expected_answer: >
    The standard waiting period for pre-existing diseases is 36 months. The
    policyholder can opt to change this to 24 months or 12 months, subject to
    the company's approval and mention in the Schedule. The waiting period may
    also be reduced based on prior continuous coverage without a break.
  must_include:
    - "36 months"

- id: opd-coverage-health-infinity
  query: "What is covered under OPD treatment in the Infinity plan?"
  expected_chunks:
    - product_name: "Indusind Health Infinity"
      section: "SECTION 3. SCOPE OF COVER"
      subsection: "3.4.5. OPD Cover"
  expected_answer: >
    OPD cover includes consultations, diagnostic tests, and prescription drugs
    (up to 35% of the OPD limit), with Plan B also covering dental OPD (dental
    consultation, treatment/surgery, periodontics) and surgical treatments.
    Exact coverage depends on the Sum Insured and plan tier.
  notes: "DRAFT — review against the actual Plan A vs Plan B table in the source doc."

- id: room-rent-limit-health-gain
  query: "What is the room rent limit under the Health Gain policy?"
  expected_chunks:
    - product_name: "Indusind Health Gain"
      section: "SECTION-6 OTHER TERMS AND CONDITION"
      subsection: "6.4. Proportionate Deductions"
  expected_answer: >
    The room rent limit depends on the plan tier. The Plus Plan allows a Single
    Private A.C. room. The Power and Prime Plans allow actuals.
  must_include:
    - "Single Private A.C"
  notes: >
    Previously a known recall gap (Learning.md 2026-06-23). Fixed by the BM25
    stopword fix (2026-06-25) — retrieval now surfaces the correct chunk and
    the answer is grounded.

- id: off-topic-pasta-refusal
  query: "What's the best way to cook pasta?"
  expected_chunks: []
  expected_answer: >
    Should decline to answer — state that the policy documents don't contain
    information about cooking pasta, without fabricating an answer.

- id: gibberish-refusal
  query: "zxqwer asdfgh poiuyt mnbvcx"
  expected_chunks: []
  expected_answer: >
    Should recognize the input as not a real question and decline to answer
    from the policy documents.
